name: Merge on green

# Auto-merge a PR, but ONLY after its Build workflow succeeds — gating the
# merge on a passing build WITHOUT relying on branch-protection "required
# checks" (which merge immediately when unset). The Build workflow runs on
# the PR; when it finishes successfully, this merges the matching PR.
#
# Notes:
# - Same-repo PRs only (fork builds run with a read-only token and must be
#   reviewed by hand).
# - Draft PRs are skipped, so open a PR as a draft to hold it.
# - Add a fine-grained PAT as the AUTOMERGE_TOKEN secret (contents +
#   pull-requests: read/write). A merge performed with the default
#   GITHUB_TOKEN does NOT trigger the release workflow; a PAT does.
on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge PR whose build passed
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - name: Merge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN != '' && secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" \
                 --state open --json number,isDraft \
                 --jq '[.[] | select(.isDraft==false)][0].number')
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No open non-draft PR for '$BRANCH' — nothing to merge."
            exit 0
          fi
          echo "Build succeeded for '$BRANCH' → merging PR #$pr"
          gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --merge
